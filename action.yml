name: 'Anodizer Action'
description: 'GitHub Action for Anodizer — a Rust-native release automation tool'
author: 'tj-smith47'
branding:
  color: 'orange'
  icon: 'package'

inputs:
  # ---------------------------------------------------------------------------
  # Installation source (pick one path)
  # ---------------------------------------------------------------------------
  version:
    description: >
      Anodizer version to install from GitHub releases. Accepts an exact tag
      (e.g. "v0.1.1") or the literal "latest". Unlike goreleaser-action, this
      input does NOT accept semver ranges such as "~> v2" or the "nightly"
      alias — pass an explicit tag or use `from-artifact` / `from-source`.
      Ignored when `from-artifact` or `from-source` is set.
    default: 'latest'
    required: false
  from-artifact:
    description: >
      Download a pre-built anodizer binary from a workflow artifact instead of
      GitHub releases. Set to the artifact name (e.g. "anodizer-linux"). For
      cross-workflow downloads, also set `artifact-run-id`.
    required: false
  artifact-run-id:
    description: >
      Workflow run ID to download the artifact from. Use "auto" to automatically
      resolve the latest successful run of `artifact-workflow` for the current
      commit. Use a numeric ID for explicit control. Omit to download from
      the current workflow run.
    required: false
  artifact-workflow:
    description: >
      Workflow filename to search when `artifact-run-id` is "auto"
      (e.g. "ci.yml"). Ignored otherwise.
    default: 'ci.yml'
    required: false
  from-source:
    description: >
      Build anodizer from source in the current workdir (bootstrap mode).
      Requires a Rust toolchain — combine with `install-rust: true` if needed.
      Useful when `from-artifact` is only available for one platform and the
      current runner needs a platform-native binary.
    default: 'false'
    required: false

  # ---------------------------------------------------------------------------
  # Dependency setup
  # ---------------------------------------------------------------------------
  install:
    description: >
      Comma-separated list of build/pipeline dependencies to install.
      Supported: nfpm, makeself, snapcraft, rpmbuild, cosign, zig,
      cargo-zigbuild, upx. Uses the platform's native package manager
      (apt on Linux, brew on macOS, choco on Windows).
    required: false
  auto-install:
    description: >
      Parse `.anodizer.yaml` in the workdir and automatically install the
      dependencies needed by the configured stages (nfpm, makeself, snapcraft,
      rpmbuild for srpm, cosign for binary_signs/docker_signs, nsis, create-dmg,
      flatpak-builder, upx, zig+cargo-zigbuild for cross-compilation).
    default: 'false'
    required: false
  install-rust:
    description: 'Install the stable Rust toolchain (dtolnay/rust-toolchain).'
    default: 'false'
    required: false

  # ---------------------------------------------------------------------------
  # Workspace resolution (monorepo tag → crate mapping)
  # ---------------------------------------------------------------------------
  resolve-workspace:
    description: >
      Resolve the triggering tag to a crate name using `anodizer resolve-tag`.
      Set to "true" on tag-triggered release workflows. Populates the
      `workspace`, `crate-path`, and `has-builds` outputs.
    default: 'false'
    required: false

  # ---------------------------------------------------------------------------
  # Docker setup (for projects using docker_v2 in .anodizer.yaml)
  # ---------------------------------------------------------------------------
  docker-registry:
    description: >
      Container registry to log in to (e.g. "ghcr.io"). When set, the action
      logs in, and sets up QEMU + buildx for multi-platform builds.
    required: false
  docker-username:
    description: 'Registry username (defaults to github.actor via GITHUB_ACTOR env).'
    required: false
  docker-password:
    description: 'Registry password or token (e.g. secrets.GITHUB_TOKEN).'
    required: false

  # ---------------------------------------------------------------------------
  # Split artifact management
  # ---------------------------------------------------------------------------
  upload-dist:
    description: >
      Upload dist/ as a workflow artifact after running anodizer. Set to "true"
      in split build jobs. The artifact name defaults to "dist-$RUNNER_OS".
    default: 'false'
    required: false
  download-dist:
    description: >
      Download and merge dist-* artifacts before running anodizer. Set to "true"
      in merge jobs. Merges all artifacts matching "dist-*" into dist/.
    default: 'false'
    required: false

  # ---------------------------------------------------------------------------
  # Key material
  # ---------------------------------------------------------------------------
  gpg-private-key:
    description: >
      GPG private key contents to import for signing. The key is piped into
      `gpg --batch --import`.
    required: false
  cosign-key:
    description: >
      Cosign private key contents. Written to `cosign.key` in the workdir
      with mode 0600. Pair with `COSIGN_PASSWORD` in the env.
    required: false

  # ---------------------------------------------------------------------------
  # Execution
  # ---------------------------------------------------------------------------
  args:
    description: >
      Arguments to pass to anodizer (e.g. "release --snapshot"). Do NOT embed
      secrets or tokens here — this value appears in workflow logs. Pass
      secrets via the `env:` block (e.g. `GITHUB_TOKEN`, `COSIGN_PASSWORD`).
    required: false
  workdir:
    description: 'Working directory (below repository root).'
    default: '.'
    required: false
  install-only:
    description: 'Only install anodizer without running it.'
    default: 'false'
    required: false

outputs:
  artifacts:
    description: 'Build result artifacts JSON (contents of dist/artifacts.json).'
    value: ${{ steps.outputs.outputs.artifacts }}
  metadata:
    description: 'Build result metadata JSON (contents of dist/metadata.json).'
    value: ${{ steps.outputs.outputs.metadata }}
  release-url:
    description: 'URL of the created GitHub release (extracted from metadata.json).'
    value: ${{ steps.outputs.outputs.release-url }}
  workspace:
    description: 'Crate name resolved from the triggering tag (requires resolve-workspace: true).'
    value: ${{ steps.resolve-workspace.outputs.crate }}
  crate-path:
    description: 'Path to the resolved crate directory (requires resolve-workspace: true).'
    value: ${{ steps.resolve-workspace.outputs.path }}
  has-builds:
    description: 'Whether the resolved crate has binary builds configured (requires resolve-workspace: true).'
    value: ${{ steps.resolve-workspace.outputs.has-builds }}
  split-matrix:
    description: >
      JSON matrix for `strategy.matrix` covering all configured build targets.
      Produced from `.anodizer.yaml` when `install-only: true`. Each entry has
      `os`, `target`, and `artifact` fields.
    value: ${{ steps.split-matrix.outputs.matrix }}

runs:
  using: 'composite'
  steps:
    # -------------------------------------------------------------------------
    # Platform detection
    # -------------------------------------------------------------------------
    - name: Determine platform
      id: platform
      shell: bash
      run: |
        set -euo pipefail
        case "$RUNNER_OS" in
          Linux)   os=linux ;;
          macOS)   os=darwin ;;
          Windows) os=windows ;;
          *)       echo "::error::Unsupported OS: $RUNNER_OS"; exit 1 ;;
        esac
        case "$RUNNER_ARCH" in
          X64)   arch=amd64 ;;
          ARM64) arch=arm64 ;;
          *)     echo "::error::Unsupported arch: $RUNNER_ARCH"; exit 1 ;;
        esac
        echo "os=$os" >> "$GITHUB_OUTPUT"
        echo "arch=$arch" >> "$GITHUB_OUTPUT"
        if [ "$os" = "windows" ]; then
          echo "bin=anodizer.exe" >> "$GITHUB_OUTPUT"
          echo "ext=zip" >> "$GITHUB_OUTPUT"
        else
          echo "bin=anodizer" >> "$GITHUB_OUTPUT"
          echo "ext=tar.gz" >> "$GITHUB_OUTPUT"
        fi

    # -------------------------------------------------------------------------
    # Rust toolchain (optional; prereq for from-source and cargo-zigbuild)
    # -------------------------------------------------------------------------
    - name: Install Rust toolchain
      if: inputs.install-rust == 'true'
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

    # -------------------------------------------------------------------------
    # Dependency installation
    # -------------------------------------------------------------------------
    - name: Auto-detect dependencies from .anodizer.yaml
      if: inputs.auto-install == 'true'
      id: auto-detect
      shell: bash
      working-directory: ${{ inputs.workdir }}
      run: |
        set -euo pipefail
        deps=()
        cfg=""
        for candidate in .anodizer.yaml .anodizer.yml anodizer.yaml anodizer.yml; do
          if [ -f "$candidate" ]; then
            cfg="$candidate"
            break
          fi
        done
        if [ -z "$cfg" ]; then
          echo "::warning::auto-install: no anodizer config found, skipping"
          echo "deps=" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        # Match top-level keys that signal dependency needs
        grep -qE '^nfpm:|^  - name: anodizer-stage-nfpm' "$cfg" && deps+=("nfpm") || true
        grep -qE '^makeselfs:' "$cfg" && deps+=("makeself") || true
        grep -qE '^snapcrafts:' "$cfg" && deps+=("snapcraft") || true
        grep -qE '^srpm:' "$cfg" && deps+=("rpmbuild") || true
        grep -qE '^binary_signs:|^docker_signs:' "$cfg" && deps+=("cosign") || true
        grep -qE '^upx:' "$cfg" && deps+=("upx") || true
        grep -qE '^nsis:' "$cfg" && deps+=("nsis") || true
        grep -qE '^dmgs:' "$cfg" && deps+=("create-dmg") || true
        grep -qE '^flatpaks:' "$cfg" && deps+=("flatpak") || true
        # pkgs/msis can't be cross-built: warn when config asks for them on the wrong runner.
        if grep -qE '^pkgs:' "$cfg" && [ "${RUNNER_OS:-}" != "macOS" ]; then
          echo "::warning::auto-install: pkgs: requires macOS runner (got ${RUNNER_OS:-unset}); skipping"
        fi
        if grep -qE '^msis:' "$cfg" && [ "${RUNNER_OS:-}" != "Windows" ]; then
          echo "::warning::auto-install: msis: requires Windows runner (got ${RUNNER_OS:-unset}); skipping"
        fi
        # Cross-compilation needs zig + cargo-zigbuild
        grep -qE '^[[:space:]]*cross:[[:space:]]*(auto|zigbuild)[[:space:]]*$' "$cfg" && deps+=("zig" "cargo-zigbuild") || true
        joined=$(IFS=','; echo "${deps[*]}")
        echo "::notice::auto-install detected: ${joined:-none}"
        echo "deps=$joined" >> "$GITHUB_OUTPUT"

    - name: Install dependencies
      if: inputs.install != '' || steps.auto-detect.outputs.deps != ''
      shell: bash
      env:
        EXPLICIT_INSTALL: ${{ inputs.install }}
        AUTO_INSTALL: ${{ steps.auto-detect.outputs.deps }}
      run: "${GITHUB_ACTION_PATH}/scripts/install-deps.sh"

    # -------------------------------------------------------------------------
    # Key material
    # -------------------------------------------------------------------------
    - name: Import GPG private key
      if: inputs.gpg-private-key != ''
      shell: bash
      env:
        GPG_PRIVATE_KEY: ${{ inputs.gpg-private-key }}
      run: |
        set -euo pipefail
        source "${GITHUB_ACTION_PATH}/scripts/lib-colors.sh"
        # Defence-in-depth: mask each line of the key in case auto-masking was
        # lost crossing a reusable-workflow boundary.
        while IFS= read -r line; do
          [ -n "$line" ] && echo "::add-mask::$line"
        done <<< "$GPG_PRIVATE_KEY"
        echo "$GPG_PRIVATE_KEY" | gpg --batch --import
        echo "::notice::GPG private key imported"
        anodizer::ok "GPG private key imported"

    - name: Write cosign key
      if: inputs.cosign-key != ''
      shell: bash
      working-directory: ${{ inputs.workdir }}
      env:
        COSIGN_KEY_CONTENTS: ${{ inputs.cosign-key }}
      run: |
        set -euo pipefail
        source "${GITHUB_ACTION_PATH}/scripts/lib-colors.sh"
        # Defence-in-depth: mask each line of the key in case auto-masking was
        # lost crossing a reusable-workflow boundary.
        while IFS= read -r line; do
          [ -n "$line" ] && echo "::add-mask::$line"
        done <<< "$COSIGN_KEY_CONTENTS"
        printf '%s' "$COSIGN_KEY_CONTENTS" > cosign.key
        chmod 600 cosign.key
        echo "::notice::Cosign key written to cosign.key"
        anodizer::ok "cosign key written to cosign.key"

    # -------------------------------------------------------------------------
    # Installation — Path A: from workflow artifact
    # -------------------------------------------------------------------------
    - name: Resolve artifact run ID
      if: inputs.from-artifact != '' && inputs.artifact-run-id != ''
      id: resolve-run
      shell: bash
      env:
        ARTIFACT_RUN_ID: ${{ inputs.artifact-run-id }}
        ARTIFACT_WORKFLOW: ${{ inputs.artifact-workflow }}
        FROM_ARTIFACT: ${{ inputs.from-artifact }}
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        COMMIT_SHA: ${{ github.sha }}
      run: |
        set -euo pipefail
        if [ "$ARTIFACT_RUN_ID" = "auto" ]; then
          "${GITHUB_ACTION_PATH}/scripts/resolve-artifact-run.sh"
        else
          echo "run_id=$ARTIFACT_RUN_ID" >> "$GITHUB_OUTPUT"
        fi

    - name: Download artifact
      if: inputs.from-artifact != ''
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: ${{ inputs.from-artifact }}
        path: ${{ runner.tool_cache }}/anodizer/artifact
        github-token: ${{ inputs.artifact-run-id != '' && github.token || '' }}
        run-id: ${{ steps.resolve-run.outputs.run_id || '' }}

    - name: Install from artifact
      if: inputs.from-artifact != ''
      shell: bash
      env:
        BIN: ${{ steps.platform.outputs.bin }}
      run: |
        set -euo pipefail
        source "${GITHUB_ACTION_PATH}/scripts/lib-colors.sh"
        install_dir="${RUNNER_TOOL_CACHE}/anodizer/artifact"
        chmod +x "${install_dir}/${BIN}" 2>/dev/null || true
        echo "${install_dir}" >> "$GITHUB_PATH"
        echo "::notice::anodizer installed from artifact to ${install_dir}"
        anodizer::verb Installed "anodizer from artifact"
        anodizer::detail "${install_dir}/${BIN}"

    # -------------------------------------------------------------------------
    # Installation — Path B: from GitHub release
    # -------------------------------------------------------------------------
    - name: Resolve version
      if: inputs.from-artifact == '' && inputs.from-source != 'true'
      id: version
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        source "${GITHUB_ACTION_PATH}/scripts/lib-colors.sh"
        if [ "$INPUT_VERSION" = "latest" ]; then
          tag=$(gh api repos/tj-smith47/anodizer/releases/latest --jq '.tag_name' 2>/dev/null || echo "")
          if [ -z "$tag" ]; then
            echo "::error::Could not resolve latest anodizer release"
            anodizer::err "could not resolve latest anodizer release"
            exit 1
          fi
        else
          if [[ "$INPUT_VERSION" =~ ^(~\>|\^|\>=|\<=|\>|\<)|nightly ]]; then
            echo "::error::version: '$INPUT_VERSION' is not supported — pass an exact tag (e.g. 'v0.1.1') or 'latest'"
            anodizer::err "version: '$INPUT_VERSION' is not supported — pass an exact tag (e.g. 'v0.1.1') or 'latest'"
            exit 1
          fi
          tag="$INPUT_VERSION"
          if [[ ! "$tag" =~ ^v ]]; then
            tag="v$tag"
          fi
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+].+)?$ ]]; then
            echo "::error::version: '$INPUT_VERSION' is not a valid semver tag (expected 'vMAJOR.MINOR.PATCH')"
            anodizer::err "version: '$INPUT_VERSION' is not a valid semver tag (expected 'vMAJOR.MINOR.PATCH')"
            exit 1
          fi
        fi
        echo "tag=$tag" >> "$GITHUB_OUTPUT"
        echo "::notice::Installing anodizer $tag"
        anodizer::verb Installing "anodizer ${tag}"

    - name: Download release
      if: inputs.from-artifact == '' && inputs.from-source != 'true'
      shell: bash
      env:
        TAG: ${{ steps.version.outputs.tag }}
        OS: ${{ steps.platform.outputs.os }}
        ARCH: ${{ steps.platform.outputs.arch }}
        EXT: ${{ steps.platform.outputs.ext }}
        BIN: ${{ steps.platform.outputs.bin }}
      run: |
        set -euo pipefail
        source "${GITHUB_ACTION_PATH}/scripts/lib-colors.sh"
        version="${TAG#v}"
        archive="anodizer-${version}-${OS}-${ARCH}.${EXT}"
        url="https://github.com/tj-smith47/anodizer/releases/download/${TAG}/${archive}"

        anodizer::verb Downloading "${archive}"
        anodizer::detail "${url}"
        echo "::group::Downloading $url"
        tmpdir=$(mktemp -d)
        downloaded=false
        for attempt in 1 2 3; do
          if curl -fsSL "$url" -o "${tmpdir}/${archive}"; then
            downloaded=true
            break
          fi
          echo "::warning::Download attempt ${attempt}/3 failed, retrying in ${attempt}s..."
          anodizer::warn "download attempt ${attempt}/3 failed, retrying in ${attempt}s..."
          sleep "$attempt"
        done
        if [ "$downloaded" != "true" ]; then
          echo "::error::Failed to download anodizer ${TAG} from ${url} after 3 attempts"
          anodizer::err "failed to download anodizer ${TAG} after 3 attempts"
          exit 1
        fi
        echo "::endgroup::"

        anodizer::verb Extracting "${archive}"
        echo "::group::Extracting"
        install_dir="${RUNNER_TOOL_CACHE}/anodizer/${version}"
        mkdir -p "$install_dir"
        if [ "$EXT" = "zip" ]; then
          unzip -q -o "${tmpdir}/${archive}" -d "$install_dir"
        else
          tar -xzf "${tmpdir}/${archive}" -C "$install_dir"
        fi
        rm -rf "$tmpdir"
        echo "::endgroup::"

        chmod +x "${install_dir}/${BIN}" 2>/dev/null || true
        echo "${install_dir}" >> "$GITHUB_PATH"
        echo "::notice::anodizer ${TAG} installed to ${install_dir}"
        anodizer::ok "anodizer ${TAG} installed"
        anodizer::detail "${install_dir}/${BIN}"

    # -------------------------------------------------------------------------
    # Installation — Path C: from source (bootstrap)
    # -------------------------------------------------------------------------
    - name: Build anodizer from source
      if: inputs.from-source == 'true'
      shell: bash
      working-directory: ${{ inputs.workdir }}
      env:
        BIN: ${{ steps.platform.outputs.bin }}
      run: |
        set -euo pipefail
        source "${GITHUB_ACTION_PATH}/scripts/lib-colors.sh"
        if ! command -v cargo > /dev/null 2>&1; then
          echo "::error::from-source requires Rust; set install-rust: true"
          anodizer::err "from-source requires Rust; set install-rust: true"
          exit 1
        fi
        anodizer::verb Building "anodizer from source"
        echo "::group::Building anodizer from source"
        cargo build --release -p anodizer
        install_dir="${RUNNER_TOOL_CACHE}/anodizer/source"
        mkdir -p "$install_dir"
        cp "target/release/${BIN}" "${install_dir}/${BIN}"
        chmod +x "${install_dir}/${BIN}" 2>/dev/null || true
        echo "${install_dir}" >> "$GITHUB_PATH"
        echo "::notice::anodizer built from source and installed to ${install_dir}"
        echo "::endgroup::"
        anodizer::ok "anodizer built from source"
        anodizer::detail "${install_dir}/${BIN}"

    # -------------------------------------------------------------------------
    # Workspace resolution (monorepo tag → crate)
    # -------------------------------------------------------------------------
    - name: Resolve workspace from tag
      if: inputs.resolve-workspace == 'true' && github.ref_type == 'tag'
      id: resolve-workspace
      shell: bash
      working-directory: ${{ inputs.workdir }}
      env:
        TAG: ${{ github.ref_name }}
      run: |
        set -euo pipefail
        source "${GITHUB_ACTION_PATH}/scripts/lib-colors.sh"
        if ! command -v anodizer > /dev/null 2>&1; then
          echo "::error::resolve-workspace requires anodizer to be installed"
          anodizer::err "resolve-workspace requires anodizer to be installed"
          exit 1
        fi
        output=$(anodizer resolve-tag "$TAG")
        crate=$(echo "$output" | grep '^crate=' | cut -d= -f2)
        path=$(echo "$output" | grep '^path=' | cut -d= -f2)
        has_builds=$(echo "$output" | grep '^has-builds=' | cut -d= -f2)
        if [ -z "$crate" ]; then
          echo "::error::No crate matches tag '$TAG'"
          anodizer::err "no crate matches tag '$TAG'"
          exit 1
        fi
        echo "crate=$crate" >> "$GITHUB_OUTPUT"
        echo "path=$path" >> "$GITHUB_OUTPUT"
        echo "has-builds=$has_builds" >> "$GITHUB_OUTPUT"
        echo "::notice::Tag '$TAG' → crate '$crate' (path=$path, has-builds=$has_builds)"
        anodizer::verb Resolved "'$TAG' → $crate"
        anodizer::kv path "$path"
        anodizer::kv has-builds "$has_builds"

    # -------------------------------------------------------------------------
    # Docker setup (login + QEMU + buildx)
    # -------------------------------------------------------------------------
    - name: Log in to container registry
      if: inputs.docker-registry != ''
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        registry: ${{ inputs.docker-registry }}
        username: ${{ inputs.docker-username || github.actor }}
        password: ${{ inputs.docker-password }}

    - name: Set up QEMU
      if: inputs.docker-registry != ''
      uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

    - name: Set up Docker Buildx
      if: inputs.docker-registry != ''
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

    # -------------------------------------------------------------------------
    # Download split artifacts (for merge jobs)
    # -------------------------------------------------------------------------
    - name: Download split artifacts
      if: inputs.download-dist == 'true'
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        path: ${{ inputs.workdir }}/dist/
        pattern: dist-*
        merge-multiple: true

    - name: Verify split artifacts
      if: inputs.download-dist == 'true'
      shell: bash
      working-directory: ${{ inputs.workdir }}
      run: |
        set -euo pipefail
        source "${GITHUB_ACTION_PATH}/scripts/lib-colors.sh"
        count=$(find dist -name context.json -type f 2>/dev/null | wc -l)
        if [ "$count" -eq 0 ]; then
          echo "::error::No split context files found in dist/"
          anodizer::err "no split context files found in dist/"
          exit 1
        fi
        anodizer::ok "found $count split context(s)"

    # -------------------------------------------------------------------------
    # Split matrix output — for users building a fan-out from config
    # -------------------------------------------------------------------------
    - name: Produce split matrix
      if: inputs.install-only == 'true'
      id: split-matrix
      shell: bash
      working-directory: ${{ inputs.workdir }}
      run: |
        set -euo pipefail
        # Produce a JSON matrix of { os, target, artifact } derived from
        # anodizer's configured build targets. Only runs when install-only.
        if ! command -v anodizer > /dev/null 2>&1; then
          echo "matrix=" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        if targets=$(anodizer targets --json 2>/dev/null); then
          echo "matrix=$targets" >> "$GITHUB_OUTPUT"
          echo "::notice::split-matrix output populated from anodizer targets --json"
        else
          echo "matrix=" >> "$GITHUB_OUTPUT"
        fi

    # -------------------------------------------------------------------------
    # Run anodizer
    # -------------------------------------------------------------------------
    - name: Run anodizer
      if: inputs.install-only != 'true' && inputs.args != ''
      shell: bash
      working-directory: ${{ inputs.workdir }}
      env:
        ANODIZER_ARGS: ${{ inputs.args }}
      run: |
        set -euo pipefail
        source "${GITHUB_ACTION_PATH}/scripts/lib-colors.sh"
        # Don't echo ANODIZER_ARGS — users pass tokens/flags via `inputs.args`
        # and GitHub Actions only auto-masks secrets registered with `::add-mask::`.
        anodizer::section "anodizer"
        # Retry up to 3 times for transient failures (registry rate limits,
        # network timeouts, Docker push auth expiry). Deterministic failures
        # (config errors, compile failures) will fail identically each time
        # but the cost of two extra 10s waits is low vs. a flaky release.
        max_retries=3
        attempt=1
        while [ $attempt -le $max_retries ]; do
          # shellcheck disable=SC2086
          # ANODIZER_ARGS is intentionally unquoted — users pass multiple flags
          # separated by whitespace via `inputs.args`, and we rely on word
          # splitting to forward them as distinct argv entries.
          if anodizer $ANODIZER_ARGS; then
            break
          fi
          if [ $attempt -eq $max_retries ]; then
            anodizer::err "anodizer failed after ${max_retries} attempts"
            exit 1
          fi
          anodizer::warn "attempt ${attempt}/${max_retries} failed; retrying in 10s..."
          # Clean generated artifacts between retries to prevent "already exists"
          # collisions.  Preserve split-build subdirectories entirely — any
          # directory holding a `context.json` is a split input (produced by a
          # build job and consumed by --merge), so its files must survive so
          # merge-mode retries can re-run idempotently.
          if [ -d "./dist" ]; then
            # Remove top-level generated files (archives, manifests, etc).
            find ./dist -maxdepth 1 -type f -delete 2>/dev/null || true
            # Remove depth-≥2 files only in subdirs that are NOT split inputs.
            for d in ./dist/*/; do
              [ -d "$d" ] || continue
              if [ ! -f "${d}context.json" ]; then
                find "$d" -type f -delete 2>/dev/null || true
              fi
            done
          fi
          sleep 10
          attempt=$((attempt + 1))
        done

    # -------------------------------------------------------------------------
    # Outputs
    # -------------------------------------------------------------------------
    - name: Collect outputs
      if: inputs.install-only != 'true' && inputs.args != ''
      id: outputs
      shell: bash
      working-directory: ${{ inputs.workdir }}
      run: |
        set -euo pipefail
        dist="dist"
        for cfg in .anodizer.yaml .anodizer.yml anodizer.yaml anodizer.yml; do
          if [ -f "$cfg" ]; then
            d=$(grep -E '^dist:' "$cfg" | head -1 | sed 's/^dist:\s*//' | tr -d '"' | tr -d "'")
            [ -n "$d" ] && dist="$d"
            break
          fi
        done

        # Use a brace-grouped block so the closing delimiter always lands on
        # its own line, even if the JSON file has no trailing newline.
        if [ -f "${dist}/artifacts.json" ]; then
          {
            echo "artifacts<<ANODIZER_EOF"
            cat "${dist}/artifacts.json"
            echo ""
            echo "ANODIZER_EOF"
          } >> "$GITHUB_OUTPUT"
        fi

        if [ -f "${dist}/metadata.json" ]; then
          {
            echo "metadata<<ANODIZER_EOF"
            cat "${dist}/metadata.json"
            echo ""
            echo "ANODIZER_EOF"
          } >> "$GITHUB_OUTPUT"

          # Extract release URL if present
          url=$(jq -r '.release_url // empty' "${dist}/metadata.json" 2>/dev/null || echo "")
          echo "release-url=${url}" >> "$GITHUB_OUTPUT"
        fi

    # -------------------------------------------------------------------------
    # Upload split artifacts (for split build jobs)
    # -------------------------------------------------------------------------
    - name: Upload split artifacts
      if: inputs.upload-dist == 'true'
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: dist-${{ runner.os }}
        path: ${{ inputs.workdir }}/dist/
