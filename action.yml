name: 'Anodize Action'
description: 'GitHub Action for Anodize — a Rust-native release automation tool'
author: 'tj-smith47'
branding:
  color: 'orange'
  icon: 'package'

inputs:
  # ---------------------------------------------------------------------------
  # Installation source (pick one path)
  # ---------------------------------------------------------------------------
  version:
    description: >
      Anodize version to install from GitHub releases (e.g. "v0.1.1", "latest").
      Ignored when `from-artifact` or `from-source` is set.
    default: 'latest'
    required: false
  from-artifact:
    description: >
      Download a pre-built anodize binary from a workflow artifact instead of
      GitHub releases. Set to the artifact name (e.g. "anodize-linux"). For
      cross-workflow downloads, also set `artifact-run-id`.
    required: false
  artifact-run-id:
    description: >
      Workflow run ID to download the artifact from. Use "auto" to automatically
      resolve the latest successful run of `artifact-workflow` for the current
      commit. Use a numeric ID for explicit control. Omit to download from
      the current workflow run.
    required: false
  artifact-workflow:
    description: >
      Workflow filename to search when `artifact-run-id` is "auto"
      (e.g. "ci.yml"). Ignored otherwise.
    default: 'ci.yml'
    required: false
  from-source:
    description: >
      Build anodize from source in the current workdir (bootstrap mode).
      Requires a Rust toolchain — combine with `install-rust: true` if needed.
      Useful when `from-artifact` is only available for one platform and the
      current runner needs a platform-native binary.
    default: 'false'
    required: false

  # ---------------------------------------------------------------------------
  # Dependency setup
  # ---------------------------------------------------------------------------
  install:
    description: >
      Comma-separated list of build/pipeline dependencies to install.
      Supported: nfpm, makeself, snapcraft, rpmbuild, cosign, zig,
      cargo-zigbuild, upx. Uses the platform's native package manager
      (apt on Linux, brew on macOS, choco on Windows).
    required: false
  auto-install:
    description: >
      Parse `.anodize.yaml` in the workdir and automatically install the
      dependencies needed by the configured stages (nfpm for linux_packages,
      makeself, snapcraft, rpmbuild for srpm, cosign for binary_signs, etc.).
    default: 'false'
    required: false
  install-rust:
    description: 'Install the stable Rust toolchain (dtolnay/rust-toolchain).'
    default: 'false'
    required: false

  # ---------------------------------------------------------------------------
  # Workspace resolution (monorepo tag → crate mapping)
  # ---------------------------------------------------------------------------
  resolve-workspace:
    description: >
      Resolve the triggering tag to a crate name using `anodize resolve-tag`.
      Set to "true" on tag-triggered release workflows. Populates the
      `workspace`, `crate-path`, and `has-builds` outputs.
    default: 'false'
    required: false

  # ---------------------------------------------------------------------------
  # Docker setup (for projects using docker_v2 in .anodize.yaml)
  # ---------------------------------------------------------------------------
  docker-registry:
    description: >
      Container registry to log in to (e.g. "ghcr.io"). When set, the action
      logs in, and sets up QEMU + buildx for multi-platform builds.
    required: false
  docker-username:
    description: 'Registry username (defaults to github.actor via GITHUB_ACTOR env).'
    required: false
  docker-password:
    description: 'Registry password or token (e.g. secrets.GITHUB_TOKEN).'
    required: false

  # ---------------------------------------------------------------------------
  # Split artifact management
  # ---------------------------------------------------------------------------
  upload-dist:
    description: >
      Upload dist/ as a workflow artifact after running anodize. Set to "true"
      in split build jobs. The artifact name defaults to "dist-$RUNNER_OS".
    default: 'false'
    required: false
  download-dist:
    description: >
      Download and merge dist-* artifacts before running anodize. Set to "true"
      in merge jobs. Merges all artifacts matching "dist-*" into dist/.
    default: 'false'
    required: false

  # ---------------------------------------------------------------------------
  # Key material
  # ---------------------------------------------------------------------------
  gpg-private-key:
    description: >
      GPG private key contents to import for signing. The key is piped into
      `gpg --batch --import`.
    required: false
  cosign-key:
    description: >
      Cosign private key contents. Written to `cosign.key` in the workdir
      with mode 0600. Pair with `COSIGN_PASSWORD` in the env.
    required: false

  # ---------------------------------------------------------------------------
  # Execution
  # ---------------------------------------------------------------------------
  args:
    description: 'Arguments to pass to anodize (e.g. "release --snapshot").'
    required: false
  workdir:
    description: 'Working directory (below repository root).'
    default: '.'
    required: false
  install-only:
    description: 'Only install anodize without running it.'
    default: 'false'
    required: false

outputs:
  artifacts:
    description: 'Build result artifacts JSON (contents of dist/artifacts.json).'
    value: ${{ steps.outputs.outputs.artifacts }}
  metadata:
    description: 'Build result metadata JSON (contents of dist/metadata.json).'
    value: ${{ steps.outputs.outputs.metadata }}
  release-url:
    description: 'URL of the created GitHub release (extracted from metadata.json).'
    value: ${{ steps.outputs.outputs.release-url }}
  workspace:
    description: 'Crate name resolved from the triggering tag (requires resolve-workspace: true).'
    value: ${{ steps.resolve-workspace.outputs.crate }}
  crate-path:
    description: 'Path to the resolved crate directory (requires resolve-workspace: true).'
    value: ${{ steps.resolve-workspace.outputs.path }}
  has-builds:
    description: 'Whether the resolved crate has binary builds configured (requires resolve-workspace: true).'
    value: ${{ steps.resolve-workspace.outputs.has-builds }}
  split-matrix:
    description: >
      JSON matrix for `strategy.matrix` covering all configured build targets.
      Produced from `.anodize.yaml` when `install-only: true`. Each entry has
      `os`, `target`, and `artifact` fields.
    value: ${{ steps.split-matrix.outputs.matrix }}

runs:
  using: 'composite'
  steps:
    # -------------------------------------------------------------------------
    # Platform detection
    # -------------------------------------------------------------------------
    - name: Determine platform
      id: platform
      shell: bash
      run: |
        case "$RUNNER_OS" in
          Linux)   os=linux ;;
          macOS)   os=darwin ;;
          Windows) os=windows ;;
          *)       echo "::error::Unsupported OS: $RUNNER_OS"; exit 1 ;;
        esac
        case "$RUNNER_ARCH" in
          X64)   arch=amd64 ;;
          ARM64) arch=arm64 ;;
          *)     echo "::error::Unsupported arch: $RUNNER_ARCH"; exit 1 ;;
        esac
        echo "os=$os" >> "$GITHUB_OUTPUT"
        echo "arch=$arch" >> "$GITHUB_OUTPUT"
        if [ "$os" = "windows" ]; then
          echo "bin=anodize.exe" >> "$GITHUB_OUTPUT"
          echo "ext=zip" >> "$GITHUB_OUTPUT"
        else
          echo "bin=anodize" >> "$GITHUB_OUTPUT"
          echo "ext=tar.gz" >> "$GITHUB_OUTPUT"
        fi

    # -------------------------------------------------------------------------
    # Rust toolchain (optional; prereq for from-source and cargo-zigbuild)
    # -------------------------------------------------------------------------
    - name: Install Rust toolchain
      if: inputs.install-rust == 'true'
      uses: dtolnay/rust-toolchain@stable

    # -------------------------------------------------------------------------
    # Dependency installation
    # -------------------------------------------------------------------------
    - name: Auto-detect dependencies from .anodize.yaml
      if: inputs.auto-install == 'true'
      id: auto-detect
      shell: bash
      working-directory: ${{ inputs.workdir }}
      run: |
        deps=()
        cfg=""
        for candidate in .anodize.yaml .anodize.yml anodize.yaml anodize.yml; do
          if [ -f "$candidate" ]; then
            cfg="$candidate"
            break
          fi
        done
        if [ -z "$cfg" ]; then
          echo "::warning::auto-install: no anodize config found, skipping"
          echo "deps=" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        # Match top-level keys that signal dependency needs
        grep -qE '^linux_packages:|^nfpms:|^  - name: anodize-stage-nfpm' "$cfg" && deps+=("nfpm") || true
        grep -qE '^makeselfs:' "$cfg" && deps+=("makeself") || true
        grep -qE '^snapcrafts:' "$cfg" && deps+=("snapcraft") || true
        grep -qE '^srpm:' "$cfg" && deps+=("rpmbuild") || true
        grep -qE '^binary_signs:|^docker_signs:' "$cfg" && deps+=("cosign") || true
        grep -qE '^upx:' "$cfg" && deps+=("upx") || true
        # Cross-compilation needs zig + cargo-zigbuild
        grep -qE 'cross:.*auto|cross:.*zigbuild' "$cfg" && deps+=("zig" "cargo-zigbuild") || true
        joined=$(IFS=','; echo "${deps[*]}")
        echo "::notice::auto-install detected: ${joined:-none}"
        echo "deps=$joined" >> "$GITHUB_OUTPUT"

    - name: Install dependencies
      if: inputs.install != '' || steps.auto-detect.outputs.deps != ''
      shell: bash
      env:
        EXPLICIT_INSTALL: ${{ inputs.install }}
        AUTO_INSTALL: ${{ steps.auto-detect.outputs.deps }}
      run: "${GITHUB_ACTION_PATH}/scripts/install-deps.sh"

    # -------------------------------------------------------------------------
    # Key material
    # -------------------------------------------------------------------------
    - name: Import GPG private key
      if: inputs.gpg-private-key != ''
      shell: bash
      env:
        GPG_PRIVATE_KEY: ${{ inputs.gpg-private-key }}
      run: |
        source "${GITHUB_ACTION_PATH}/scripts/lib-colors.sh"
        echo "$GPG_PRIVATE_KEY" | gpg --batch --import
        echo "::notice::GPG private key imported"
        anodize::ok "GPG private key imported"

    - name: Write cosign key
      if: inputs.cosign-key != ''
      shell: bash
      working-directory: ${{ inputs.workdir }}
      env:
        COSIGN_KEY_CONTENTS: ${{ inputs.cosign-key }}
      run: |
        source "${GITHUB_ACTION_PATH}/scripts/lib-colors.sh"
        printf '%s' "$COSIGN_KEY_CONTENTS" > cosign.key
        chmod 600 cosign.key
        echo "::notice::Cosign key written to cosign.key"
        anodize::ok "cosign key written to cosign.key"

    # -------------------------------------------------------------------------
    # Installation — Path A: from workflow artifact
    # -------------------------------------------------------------------------
    - name: Resolve artifact run ID
      if: inputs.from-artifact != '' && inputs.artifact-run-id != ''
      id: resolve-run
      shell: bash
      env:
        ARTIFACT_RUN_ID: ${{ inputs.artifact-run-id }}
        ARTIFACT_WORKFLOW: ${{ inputs.artifact-workflow }}
        FROM_ARTIFACT: ${{ inputs.from-artifact }}
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        COMMIT_SHA: ${{ github.sha }}
      run: |
        if [ "$ARTIFACT_RUN_ID" = "auto" ]; then
          "${GITHUB_ACTION_PATH}/scripts/resolve-artifact-run.sh"
        else
          echo "run_id=$ARTIFACT_RUN_ID" >> "$GITHUB_OUTPUT"
        fi

    - name: Download artifact
      if: inputs.from-artifact != ''
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.from-artifact }}
        path: ${{ runner.tool_cache }}/anodize/artifact
        github-token: ${{ inputs.artifact-run-id != '' && github.token || '' }}
        run-id: ${{ steps.resolve-run.outputs.run_id || '' }}

    - name: Install from artifact
      if: inputs.from-artifact != ''
      shell: bash
      env:
        BIN: ${{ steps.platform.outputs.bin }}
      run: |
        source "${GITHUB_ACTION_PATH}/scripts/lib-colors.sh"
        install_dir="${RUNNER_TOOL_CACHE}/anodize/artifact"
        chmod +x "${install_dir}/${BIN}" 2>/dev/null || true
        echo "${install_dir}" >> "$GITHUB_PATH"
        echo "::notice::anodize installed from artifact to ${install_dir}"
        anodize::verb Installed "anodize from artifact"
        anodize::detail "${install_dir}/${BIN}"

    # -------------------------------------------------------------------------
    # Installation — Path B: from GitHub release
    # -------------------------------------------------------------------------
    - name: Resolve version
      if: inputs.from-artifact == '' && inputs.from-source != 'true'
      id: version
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        GH_TOKEN: ${{ github.token }}
      run: |
        source "${GITHUB_ACTION_PATH}/scripts/lib-colors.sh"
        if [ "$INPUT_VERSION" = "latest" ]; then
          tag=$(gh api repos/tj-smith47/anodize/releases/latest --jq '.tag_name' 2>/dev/null || echo "")
          if [ -z "$tag" ]; then
            echo "::error::Could not resolve latest anodize release"
            anodize::err "could not resolve latest anodize release"
            exit 1
          fi
        else
          tag="$INPUT_VERSION"
          if [[ ! "$tag" =~ ^v ]]; then
            tag="v$tag"
          fi
        fi
        echo "tag=$tag" >> "$GITHUB_OUTPUT"
        echo "::notice::Installing anodize $tag"
        anodize::verb Installing "anodize ${tag}"

    - name: Download release
      if: inputs.from-artifact == '' && inputs.from-source != 'true'
      shell: bash
      env:
        TAG: ${{ steps.version.outputs.tag }}
        OS: ${{ steps.platform.outputs.os }}
        ARCH: ${{ steps.platform.outputs.arch }}
        EXT: ${{ steps.platform.outputs.ext }}
        BIN: ${{ steps.platform.outputs.bin }}
      run: |
        source "${GITHUB_ACTION_PATH}/scripts/lib-colors.sh"
        version="${TAG#v}"
        archive="anodize-${version}-${OS}-${ARCH}.${EXT}"
        url="https://github.com/tj-smith47/anodize/releases/download/${TAG}/${archive}"

        anodize::verb Downloading "${archive}"
        anodize::detail "${url}"
        echo "::group::Downloading $url"
        tmpdir=$(mktemp -d)
        downloaded=false
        for attempt in 1 2 3; do
          if curl -fsSL "$url" -o "${tmpdir}/${archive}"; then
            downloaded=true
            break
          fi
          echo "::warning::Download attempt ${attempt}/3 failed, retrying in ${attempt}s..."
          anodize::warn "download attempt ${attempt}/3 failed, retrying in ${attempt}s..."
          sleep "$attempt"
        done
        if [ "$downloaded" != "true" ]; then
          echo "::error::Failed to download anodize ${TAG} from ${url} after 3 attempts"
          anodize::err "failed to download anodize ${TAG} after 3 attempts"
          exit 1
        fi
        echo "::endgroup::"

        anodize::verb Extracting "${archive}"
        echo "::group::Extracting"
        install_dir="${RUNNER_TOOL_CACHE}/anodize/${version}"
        mkdir -p "$install_dir"
        if [ "$EXT" = "zip" ]; then
          unzip -q -o "${tmpdir}/${archive}" -d "$install_dir"
        else
          tar -xzf "${tmpdir}/${archive}" -C "$install_dir"
        fi
        rm -rf "$tmpdir"
        echo "::endgroup::"

        chmod +x "${install_dir}/${BIN}" 2>/dev/null || true
        echo "${install_dir}" >> "$GITHUB_PATH"
        echo "::notice::anodize ${TAG} installed to ${install_dir}"
        anodize::ok "anodize ${TAG} installed"
        anodize::detail "${install_dir}/${BIN}"

    # -------------------------------------------------------------------------
    # Installation — Path C: from source (bootstrap)
    # -------------------------------------------------------------------------
    - name: Build anodize from source
      if: inputs.from-source == 'true'
      shell: bash
      working-directory: ${{ inputs.workdir }}
      env:
        BIN: ${{ steps.platform.outputs.bin }}
      run: |
        source "${GITHUB_ACTION_PATH}/scripts/lib-colors.sh"
        if ! command -v cargo > /dev/null 2>&1; then
          echo "::error::from-source requires Rust; set install-rust: true"
          anodize::err "from-source requires Rust; set install-rust: true"
          exit 1
        fi
        anodize::verb Building "anodize from source"
        echo "::group::Building anodize from source"
        cargo build --release -p anodize
        install_dir="${RUNNER_TOOL_CACHE}/anodize/source"
        mkdir -p "$install_dir"
        cp "target/release/${BIN}" "${install_dir}/${BIN}"
        chmod +x "${install_dir}/${BIN}" 2>/dev/null || true
        echo "${install_dir}" >> "$GITHUB_PATH"
        echo "::notice::anodize built from source and installed to ${install_dir}"
        echo "::endgroup::"
        anodize::ok "anodize built from source"
        anodize::detail "${install_dir}/${BIN}"

    # -------------------------------------------------------------------------
    # Workspace resolution (monorepo tag → crate)
    # -------------------------------------------------------------------------
    - name: Resolve workspace from tag
      if: inputs.resolve-workspace == 'true'
      id: resolve-workspace
      shell: bash
      working-directory: ${{ inputs.workdir }}
      env:
        TAG: ${{ github.ref_name }}
      run: |
        source "${GITHUB_ACTION_PATH}/scripts/lib-colors.sh"
        if ! command -v anodize > /dev/null 2>&1; then
          echo "::error::resolve-workspace requires anodize to be installed"
          anodize::err "resolve-workspace requires anodize to be installed"
          exit 1
        fi
        output=$(anodize resolve-tag "$TAG")
        crate=$(echo "$output" | grep '^crate=' | cut -d= -f2)
        path=$(echo "$output" | grep '^path=' | cut -d= -f2)
        has_builds=$(echo "$output" | grep '^has-builds=' | cut -d= -f2)
        if [ -z "$crate" ]; then
          echo "::error::No crate matches tag '$TAG'"
          anodize::err "no crate matches tag '$TAG'"
          exit 1
        fi
        echo "crate=$crate" >> "$GITHUB_OUTPUT"
        echo "path=$path" >> "$GITHUB_OUTPUT"
        echo "has-builds=$has_builds" >> "$GITHUB_OUTPUT"
        echo "::notice::Tag '$TAG' → crate '$crate' (path=$path, has-builds=$has_builds)"
        anodize::verb Resolved "'$TAG' → $crate"
        anodize::kv path "$path"
        anodize::kv has-builds "$has_builds"

    # -------------------------------------------------------------------------
    # Docker setup (login + QEMU + buildx)
    # -------------------------------------------------------------------------
    - name: Log in to container registry
      if: inputs.docker-registry != ''
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.docker-registry }}
        username: ${{ inputs.docker-username || github.actor }}
        password: ${{ inputs.docker-password }}

    - name: Set up QEMU
      if: inputs.docker-registry != ''
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      if: inputs.docker-registry != ''
      uses: docker/setup-buildx-action@v3

    # -------------------------------------------------------------------------
    # Download split artifacts (for merge jobs)
    # -------------------------------------------------------------------------
    - name: Download split artifacts
      if: inputs.download-dist == 'true'
      uses: actions/download-artifact@v4
      with:
        path: ${{ inputs.workdir }}/dist/
        pattern: dist-*
        merge-multiple: true

    - name: Verify split artifacts
      if: inputs.download-dist == 'true'
      shell: bash
      working-directory: ${{ inputs.workdir }}
      run: |
        source "${GITHUB_ACTION_PATH}/scripts/lib-colors.sh"
        count=$(find dist -name context.json -type f 2>/dev/null | wc -l)
        if [ "$count" -eq 0 ]; then
          echo "::error::No split context files found in dist/"
          anodize::err "no split context files found in dist/"
          exit 1
        fi
        anodize::ok "found $count split context(s)"

    # -------------------------------------------------------------------------
    # Split matrix output — for users building a fan-out from config
    # -------------------------------------------------------------------------
    - name: Produce split matrix
      if: inputs.install-only == 'true'
      id: split-matrix
      shell: bash
      working-directory: ${{ inputs.workdir }}
      run: |
        # Produce a JSON matrix of { os, target, artifact } derived from
        # anodize's configured build targets. Only runs when install-only.
        if ! command -v anodize > /dev/null 2>&1; then
          echo "matrix=" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        if targets=$(anodize targets --json 2>/dev/null); then
          echo "matrix=$targets" >> "$GITHUB_OUTPUT"
          echo "::notice::split-matrix output populated from anodize targets --json"
        else
          echo "matrix=" >> "$GITHUB_OUTPUT"
        fi

    # -------------------------------------------------------------------------
    # Run anodize
    # -------------------------------------------------------------------------
    - name: Run anodize
      if: inputs.install-only != 'true' && inputs.args != ''
      shell: bash
      working-directory: ${{ inputs.workdir }}
      env:
        ANODIZE_ARGS: ${{ inputs.args }}
      run: |
        source "${GITHUB_ACTION_PATH}/scripts/lib-colors.sh"
        anodize::section "anodize ${ANODIZE_ARGS}"
        # Retry up to 3 times for transient failures (registry rate limits,
        # network timeouts, Docker push auth expiry). Deterministic failures
        # (config errors, compile failures) will fail identically each time
        # but the cost of two extra 10s waits is low vs. a flaky release.
        max_retries=3
        attempt=1
        while [ $attempt -le $max_retries ]; do
          if anodize $ANODIZE_ARGS; then
            break
          fi
          if [ $attempt -eq $max_retries ]; then
            anodize::err "anodize failed after ${max_retries} attempts"
            exit 1
          fi
          anodize::warn "attempt ${attempt}/${max_retries} failed; retrying in 10s..."
          sleep 10
          attempt=$((attempt + 1))
        done

    # -------------------------------------------------------------------------
    # Outputs
    # -------------------------------------------------------------------------
    - name: Collect outputs
      if: inputs.install-only != 'true' && inputs.args != ''
      id: outputs
      shell: bash
      working-directory: ${{ inputs.workdir }}
      run: |
        dist="dist"
        for cfg in .anodize.yaml .anodize.yml anodize.yaml anodize.yml; do
          if [ -f "$cfg" ]; then
            d=$(grep -E '^dist:' "$cfg" | head -1 | sed 's/^dist:\s*//' | tr -d '"' | tr -d "'")
            [ -n "$d" ] && dist="$d"
            break
          fi
        done

        # Use a brace-grouped block so the closing delimiter always lands on
        # its own line, even if the JSON file has no trailing newline.
        if [ -f "${dist}/artifacts.json" ]; then
          {
            echo "artifacts<<ANODIZE_EOF"
            cat "${dist}/artifacts.json"
            echo ""
            echo "ANODIZE_EOF"
          } >> "$GITHUB_OUTPUT"
        fi

        if [ -f "${dist}/metadata.json" ]; then
          {
            echo "metadata<<ANODIZE_EOF"
            cat "${dist}/metadata.json"
            echo ""
            echo "ANODIZE_EOF"
          } >> "$GITHUB_OUTPUT"

          # Extract release URL if present
          url=$(jq -r '.release_url // empty' "${dist}/metadata.json" 2>/dev/null || echo "")
          echo "release-url=${url}" >> "$GITHUB_OUTPUT"
        fi

    # -------------------------------------------------------------------------
    # Upload split artifacts (for split build jobs)
    # -------------------------------------------------------------------------
    - name: Upload split artifacts
      if: inputs.upload-dist == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: dist-${{ runner.os }}
        path: ${{ inputs.workdir }}/dist/
